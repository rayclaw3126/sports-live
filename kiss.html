<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>918 Style Lobby</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body {
    background: radial-gradient(circle at center, #5b1a6b 0%, #2a0835 70%, #15001c 100%);
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
  }

  /* --- LEFT PANEL --- */
  .left-panel {
    width: 30%;
    min-width: 250px;
    height: 100%;
    background: linear-gradient(90deg, #1c1c1c 0%, #3a3a3a 80%, #111 100%);
    border-right: 3px solid #666;
    display: flex;
    flex-direction: column;
    padding: 10px;
    position: relative;
    box-shadow: 5px 0 15px rgba(0,0,0,0.8);
    z-index: 10;
  }

  /* Top Preview Screen */
  .preview-screen {
    background: radial-gradient(circle, #1a4a6b, #001a33);
    border: 4px solid #3da1e3;
    border-radius: 12px;
    height: 140px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(61,161,227,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .preview-screen::before {
    content: '龙 赢';
    font-size: 2rem;
    font-weight: 900;
    color: #ff3333;
    text-shadow: 2px 2px 0 #fff;
    letter-spacing: 5px;
  }
  .pop-tag {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #ff4d4d, #b30000);
    color: white;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 2px 10px;
    border-radius: 10px;
    border: 1px solid #fff;
    white-space: nowrap;
  }

  /* Action Buttons */
  .action-btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.4);
    font-weight: bold;
    font-size: 0.9rem;
    text-align: right;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
    position: relative;
    box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 4px 5px rgba(0,0,0,0.5);
  }
  .action-btn::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
    border-radius: 4px 4px 0 0;
  }
  .btn-green { background: linear-gradient(180deg, #00b300, #004d00); }
  .btn-blue { background: linear-gradient(180deg, #1a0099, #0d004d); }
  
  .btn-icon-ph {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; background: rgba(0,0,0,0.3); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  }

  /* Account Info */
  .account-box {
    margin-top: auto;
    background: #000;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 2px;
  }
  .acc-row {
    display: flex;
    align-items: center;
    background: linear-gradient(180deg, #333, #111);
    margin-bottom: 2px;
    border-radius: 4px;
    height: 35px;
  }
  .acc-label {
    background: linear-gradient(180deg, #b300b3, #4d004d);
    color: white;
    font-size: 0.7rem;
    font-weight: bold;
    padding: 0 10px;
    height: 100%;
    display: flex;
    align-items: center;
    border-radius: 4px 0 0 4px;
    width: 80px;
  }
  .acc-label.red { background: linear-gradient(180deg, #ff3333, #990000); }
  .acc-value {
    flex: 1;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    color: #fff;
    text-shadow: 0 0 5px #fff;
  }

  /* --- RIGHT PANEL --- */
  .right-panel {
    flex: 1;
    position: relative;
    padding: 10px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Giant glowing circle background */
  .purple-glow-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80vh; height: 80vh;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,32,240,0.3) 0%, transparent 70%);
    border: 2px solid rgba(160,32,240,0.2);
    z-index: 0;
    pointer-events: none;
  }

  /* Close Btn */
  .close-btn {
    position: absolute;
    top: 10px; right: 10px;
    width: 36px; height: 36px;
    background: linear-gradient(180deg, #800080, #330033);
    border: 2px solid #d8bfd8;
    border-radius: 50%;
    color: white;
    font-size: 1.2rem;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    z-index: 20;
    cursor: pointer;
  }

  /* Jackpot Display */
  .jackpot-container {
    margin-top: 10px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  .jackpot-title {
    color: #ff3333;
    font-size: 1.5rem;
    font-weight: 900;
    text-shadow: 2px 2px 0 #ffff00, -1px -1px 0 #ffff00, 0 0 10px #ff0000;
    letter-spacing: 2px;
    margin-bottom: 5px;
    display: inline-block;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffd700"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5z"/></svg>') no-repeat center top;
    padding-top: 20px;
    background-size: 30px;
  }
  .led-box {
    background: #111;
    border: 4px solid #ffd700; /* Gold border */
    border-radius: 8px;
    padding: 5px 15px;
    box-shadow: 0 0 20px rgba(255,215,0,0.6), inset 0 0 10px #000;
    position: relative;
    display: inline-block;
  }
  /* Little dots border for LED box */
  .led-box::before, .led-box::after {
    content: ''; position: absolute; left: 2px; right: 2px; height: 2px; background: repeating-linear-gradient(90deg, #ffd700, #ffd700 4px, transparent 4px, transparent 8px);
  }
  .led-box::before { top: 2px; } .led-box::after { bottom: 2px; }

  .led-numbers {
    font-family: 'Share Tech Mono', monospace;
    font-size: 3rem;
    color: #ffcc00;
    text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
    letter-spacing: 5px;
    line-height: 1;
  }

  /* Game Grid */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 25px;
    width: 90%;
    max-width: 800px;
    z-index: 10;
  }

  .game-card {
    background: #000;
    border: 2px solid #b8860b; /* Dark gold */
    border-radius: 8px;
    position: relative;
    padding: 2px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,215,0,0.2);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .game-card:active { transform: scale(0.95); }
  
  .game-img-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2a6c, #11998e);
    border-radius: 4px 4px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .game-img-placeholder.blue { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
  .game-img-placeholder.gold { background: linear-gradient(135deg, #4b1248, #f0c27b); }
  .game-img-placeholder.purple { background: linear-gradient(135deg, #240b36, #c31432); }

  .game-title-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    text-align: center;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 4px 0;
    text-transform: uppercase;
    text-shadow: 1px 1px 1px #000;
  }

  .game-prize {
    text-align: center;
    font-size: 0.8rem;
    color: #fff;
    background: linear-gradient(180deg, #444, #111);
    padding: 3px 0;
    border-radius: 0 0 4px 4px;
    border-top: 1px solid #b8860b;
  }

  /* Bottom Controls */
  .bottom-controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    z-index: 20;
  }
  .pill-btn {
    background: linear-gradient(180deg, #ff4d4d, #990000);
    border: 2px solid #fff;
    border-radius: 20px;
    color: white;
    font-weight: bold;
    font-size: 0.75rem;
    padding: 6px 20px;
    text-shadow: 1px 1px 2px #000;
    box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.4);
    cursor: pointer;
  }

  /* Logo Placeholder */
  .kiss-logo {
    position: absolute;
    bottom: 40px;
    right: 40px;
    font-size: 2.5rem;
    font-weight: 900;
    font-style: italic;
    color: #ffb3ff;
    text-shadow: 0 0 10px #ff00ff, 2px 2px 0 #ff0066, -2px -2px 0 #fff;
    z-index: 15;
    transform: rotate(-10deg);
  }

  /* Mobile specific adjustments to mimic landscape app */
  @media (orientation: portrait) {
    body { flex-direction: column; }
    .left-panel { width: 100%; height: auto; border-right: none; border-bottom: 3px solid #666; flex-direction: row; flex-wrap: wrap; padding: 5px; }
    .preview-screen { width: 40%; height: 80px; margin-bottom: 0; }
    .action-btn { width: 28%; margin: 0 0 0 5px; padding: 5px; font-size: 0.7rem; }
    .account-box { width: 100%; margin-top: 5px; display: flex; gap: 5px; }
    .acc-row { flex: 1; margin: 0; height: 28px; }
    .game-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    .led-numbers { font-size: 2rem; }
    .purple-glow-circle { width: 100vw; height: 100vw; }
    .kiss-logo { bottom: 60px; right: 20px; font-size: 1.8rem; }
  }

</style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="preview-screen">
      <div class="pop-tag">MOST POPULAR</div>
    </div>
    
    <div class="action-btn btn-green">
      <div class="btn-icon-ph">🎰</div>
      ONLINE<br>GAMING
    </div>
    <div class="action-btn btn-blue">
      <div class="btn-icon-ph">⬇️</div>
      Add to<br>HOME SCREEN
    </div>
    
    <div class="account-box">
      <div class="acc-row">
        <div class="acc-label">ACCOUNT</div>
        <div class="acc-value">test2000</div>
      </div>
      <div class="acc-row">
        <div class="acc-label red">BAL</div>
        <div class="acc-value">2000.00</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="purple-glow-circle"></div>
    <div class="close-btn">X</div>

    <div class="jackpot-container">
      <div class="jackpot-title">SPECIAL BONUS</div>
      <div class="led-box">
        <div class="led-numbers" id="jackpotNum">406415994</div>
      </div>
    </div>

    <div class="game-grid">
      <!-- Card 1 -->
      <div class="game-card">
        <div class="game-img-placeholder blue">
          <span style="font-size: 2rem;">🐻‍❄️</span>
          <div class="game-title-overlay">ICELAND</div>
        </div>
        <div class="game-prize">2797.00</div>
      </div>
      <!-- Card 2 -->
      <div class="game-card">
        <div class="game-img-placeholder">
          <span style="font-size: 2rem;">🐋</span>
          <div class="game-title-overlay">SeaWorld</div>
        </div>
        <div class="game-prize">6211.00</div>
      </div>
      <!-- Card 3 -->
      <div class="game-card">
        <div class="game-img-placeholder blue">
          <span style="font-size: 2rem;">🐬</span>
          <div class="game-title-overlay">DolphinReef</div>
        </div>
        <div class="game-prize">962.00</div>
      </div>
      <!-- Card 4 -->
      <div class="game-card">
        <div class="game-img-placeholder">
          <span style="font-size: 2rem;">🦈</span>
          <div class="game-title-overlay">GreatBlue</div>
        </div>
        <div class="game-prize">962.00</div>
      </div>
      <!-- Card 5 -->
      <div class="game-card">
        <div class="game-img-placeholder gold">
          <span style="font-size: 2rem;">🐸</span>
          <div class="game-title-overlay">JinQianWa</div>
        </div>
        <div class="game-prize">5493.00</div>
      </div>
      <!-- Card 6 -->
      <div class="game-card">
        <div class="game-img-placeholder purple">
          <span style="font-size: 2rem;">🐆</span>
          <div class="game-title-overlay">PantherMoon</div>
        </div>
        <div class="game-prize">703.00</div>
      </div>
      <!-- Card 7 -->
      <div class="game-card">
        <div class="game-img-placeholder gold">
          <span style="font-size: 2rem;">🛕</span>
          <div class="game-title-overlay">India</div>
        </div>
        <div class="game-prize">5015.00</div>
      </div>
      <!-- Card 8 -->
      <div class="game-card">
        <div class="game-img-placeholder gold">
          <span style="font-size: 2rem;">🗿</span>
          <div class="game-title-overlay">BoyKing</div>
        </div>
        <div class="game-prize">3205.00</div>
      </div>
    </div>

    <div class="kiss-logo">New<br><span style="font-size: 3.5rem;">918 Kiss</span></div>

    <div class="bottom-controls">
      <div class="pill-btn">SUGGESTION</div>
      <div class="pill-btn">SCORELOG</div>
      <div class="pill-btn">MENU</div>
    </div>
  </div>

  <script>
    // Simulate jackpot running
    let jackpot = 406415994;
    const numEl = document.getElementById('jackpotNum');
    setInterval(() => {
      jackpot += Math.floor(Math.random() * 10);
      numEl.textContent = jackpot;
    }, 1500);
  </script>
</body>
</html>
