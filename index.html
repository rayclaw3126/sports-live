<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Sports Live - 即时比分</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060d1a;--card:#0d1b2e;--card2:#111f35;--border:#1a3050;
  --blue:#2563eb;--blue2:#1d4ed8;--accent:#38bdf8;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --win:#166534;--draw:#854d0e;--loss:#7f1d1d;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
/* HEADER */
.header{background:linear-gradient(135deg,#0a1628,#0f2044);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:28px;filter:drop-shadow(0 0 8px #2563eb)}
.logo-text h1{font-size:1.2rem;font-weight:800;background:linear-gradient(90deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text p{font-size:0.65rem;color:var(--text3);letter-spacing:1px}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:20px;padding:4px 10px}
.live-dot{width:7px;height:7px;background:#ef4444;border-radius:50%;box-shadow:0 0 6px #ef4444;animation:livepulse 1.2s ease-in-out infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.live-text{font-size:0.7rem;font-weight:700;color:#ef4444;letter-spacing:1px}
/* NAV */
.nav{background:#0a1628;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;padding:0 12px}
.nav-tab{padding:12px 16px;font-size:0.82rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* LAYOUT */
.main{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 320px;gap:16px}
@media(max-width:768px){.main{grid-template-columns:1fr}.standings-col{display:none}}
/* SECTION HEADER */
.section-title{font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);border-radius:3px 0 0 3px}
.match-card.finished::before{background:var(--green)}
.match-card.upcoming::before{background:var(--yellow)}
.match-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 20px rgba(37,99,235,0.15)}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-league{font-size:0.65rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.match-status{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.status-fin{background:rgba(34,197,94,0.15);color:var(--green)}
.status-up{background:rgba(245,158,11,0.15);color:var(--yellow)}
.match-teams{display:flex;align-items:center;gap:8px}
.team-side{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.team-badge{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(0,0,0,0.5))}
.team-badge-placeholder{width:36px;height:36px;background:var(--card2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem}
.team-name{font-size:0.78rem;font-weight:600;text-align:center;color:var(--text)}
.score-box{display:flex;flex-direction:column;align-items:center;min-width:80px}
.score{font-size:1.8rem;font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 0 20px rgba(56,189,248,0.3)}
.score-date{font-size:0.62rem;color:var(--text3);margin-top:2px}
.score-vs{font-size:0.9rem;color:var(--text3);font-weight:700}
/* FORM BADGES */
.form-row{display:flex;gap:3px;justify-content:center;margin-top:4px}
.form-badge{width:16px;height:16px;border-radius:3px;font-size:0.55rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.form-w{background:var(--win);color:#86efac}
.form-d{background:var(--draw);color:#fcd34d}
.form-l{background:var(--loss);color:#fca5a5}
/* STANDINGS */
.standings-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:70px}
.standings-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.standings-header span{font-size:0.8rem;font-weight:700;color:var(--text)}
.table-row{display:grid;grid-template-columns:28px 1fr 28px 28px 28px 36px;gap:4px;padding:9px 12px;align-items:center;border-bottom:1px solid rgba(26,48,80,0.5);transition:background 0.15s;font-size:0.75rem}
.table-row:hover{background:var(--card2)}
.table-row.header{background:rgba(37,99,235,0.1);font-size:0.65rem;color:var(--text3);font-weight:700;text-transform:uppercase}
.rank{color:var(--text3);font-weight:700;text-align:center}
.rank.top4{color:var(--blue);font-weight:800}
.rank.top6{color:var(--accent)}
.team-cell{display:flex;align-items:center;gap:6px;overflow:hidden}
.mini-badge{width:18px;height:18px;object-fit:contain}
.team-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.pts{font-weight:800;color:var(--accent);text-align:center}
.stat{color:var(--text3);text-align:center}
/* PREDICTION */
.predict-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.predict-teams{text-align:center;font-weight:700;font-size:0.95rem;margin-bottom:14px;color:var(--text)}
.prob-row{margin-bottom:10px}
.prob-label{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text2);margin-bottom:4px}
.prob-bar{height:8px;border-radius:4px;background:var(--card2);overflow:hidden}
.prob-fill{height:100%;border-radius:4px;transition:width 1s ease}
.fill-home{background:linear-gradient(90deg,#2563eb,#38bdf8)}
.fill-draw{background:linear-gradient(90deg,#d97706,#fbbf24)}
.fill-away{background:linear-gradient(90deg,#16a34a,#4ade80)}
.ai-note{font-size:0.68rem;color:var(--text3);text-align:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{font-size:2rem;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* SCROLL TO TOP */
.scroll-top{position:fixed;bottom:20px;right:20px;background:var(--blue);color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.2rem;display:none;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(37,99,235,0.4)}
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sports Live">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">⚽</span>
      <div class="logo-text">
        <h1>Sports Live</h1>
        <p>即时比分 · LIVE SCORES · ពិន្ទុផ្ទាល់</p>
      </div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
  </div>
</div>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-tab active" onclick="switchLeague(4328,'epl',this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 英超</div>
    <div class="nav-tab" onclick="switchLeague(4335,'laliga',this)">🇪🇸 西甲</div>
    <div class="nav-tab" onclick="switchLeague(4332,'seriea',this)">🇮🇹 意甲</div>
    <div class="nav-tab" onclick="switchLeague(4331,'bund',this)">🇩🇪 德甲</div>
    <div class="nav-tab" onclick="switchLeague(4334,'ligue1',this)">🇫🇷 法甲</div>
    <div class="nav-tab" onclick="switchLeague(null,'predict',this)">🔮 AI预测</div>
    <a href="game.html" style="text-decoration:none"><div class="nav-tab" style="color:#f59e0b">🎯 猜比分</div></a>
  </div>
</div>

<div class="main">
  <div class="matches-col">
    <div id="matches-content">
      <div class="loading"><div class="spinner">⚽</div><p style="margin-top:10px">加载中...</p></div>
    </div>
  </div>
  <div class="standings-col">
    <div class="standings-card">
      <div class="standings-header">🏆 <span>积分榜 Standings</span></div>
      <div class="table-row header">
        <span>#</span><span>球队</span><span>赛</span><span>胜</span><span>负</span><span>积分</span>
      </div>
      <div id="standings-content"><div class="loading" style="padding:20px"><div class="spinner" style="font-size:1rem">⏳</div></div></div>
    </div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const API = 'https://www.thesportsdb.com/api/v1/json/3';
let currentLeague = 4328;

window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'flex' : 'none';
});

function formBadge(f) {
  if(!f) return '';
  return f.split('').slice(0,5).map(c => {
    const cls = c==='W'?'form-w':c==='D'?'form-d':'form-l';
    return `<span class="form-badge ${cls}">${c}</span>`;
  }).join('');
}

function matchCard(e) {
  const hs = e.intHomeScore !== null && e.intHomeScore !== '' ? e.intHomeScore : null;
  const as = e.intAwayScore !== null && e.intAwayScore !== '' ? e.intAwayScore : null;
  const finished = hs !== null;
  const scoreHtml = finished
    ? `<div class="score">${hs} - ${as}</div><div class="score-date">${e.dateEvent||''}</div>`
    : `<div class="score-vs">VS</div><div class="score-date">${e.dateEvent||''}</div>`;
  const homeThumb = e.strHomeTeamBadge ? `<img class="team-badge" src="${e.strHomeTeamBadge}/preview" onerror="this.style.display='none'">` : '<div class="team-badge-placeholder">🏠</div>';
  const awayThumb = e.strAwayTeamBadge ? `<img class="team-badge" src="${e.strAwayTeamBadge}/preview" onerror="this.style.display='none'">` : '<div class="team-badge-placeholder">✈️</div>';
  return `
  <div class="match-card ${finished?'finished':'upcoming'}" onclick="showPredict('${e.strHomeTeam}','${e.strAwayTeam}',${hs||0},${as||0})">
    <div class="match-meta">
      <span class="match-league">${e.strLeague||''} · R${e.intRound||'-'}</span>
      <span class="match-status ${finished?'status-fin':'status-up'}">${finished?'✅ 完场':'🕐 未开赛'}</span>
    </div>
    <div class="match-teams">
      <div class="team-side">${homeThumb}<div class="team-name">${e.strHomeTeam}</div></div>
      <div class="score-box">${scoreHtml}</div>
      <div class="team-side">${awayThumb}<div class="team-name">${e.strAwayTeam}</div></div>
    </div>
  </div>`;
}

async function loadMatches(leagueId) {
  document.getElementById('matches-content').innerHTML = '<div class="loading"><div class="spinner">⚽</div><p style="margin-top:10px">加载中...</p></div>';
  try {
    const r = await fetch(`${API}/eventspastleague.php?id=${leagueId}`);
    const d = await r.json();
    const events = (d.events||[]).reverse();
    if(!events.length){document.getElementById('matches-content').innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">暂无数据</p>';return;}
    document.getElementById('matches-content').innerHTML =
      `<div class="section-title">最近比赛结果</div>` + events.map(matchCard).join('');
  } catch(e) {
    document.getElementById('matches-content').innerHTML = '<p style="color:#ef4444;text-align:center;padding:40px">加载失败，请稍后重试</p>';
  }
}

async function loadStandings(leagueId) {
  document.getElementById('standings-content').innerHTML = '<div class="loading" style="padding:20px"><div class="spinner" style="font-size:1rem">⏳</div></div>';
  try {
    const r = await fetch(`${API}/lookuptable.php?l=${leagueId}&s=2024-2025`);
    const d = await r.json();
    const table = d.table||[];
    if(!table.length){document.getElementById('standings-content').innerHTML='<p style="color:var(--text3);font-size:0.75rem;padding:16px">暂无积分榜</p>';return;}
    document.getElementById('standings-content').innerHTML = table.map((t,i) => {
      const rank = parseInt(t.intRank||i+1);
      const rankClass = rank<=4?'top4':rank<=6?'top6':'';
      const badge = t.strBadge ? `<img class="mini-badge" src="${t.strBadge}/preview" onerror="this.style.display='none'">` : '';
      return `<div class="table-row">
        <span class="rank ${rankClass}">${rank}</span>
        <div class="team-cell">${badge}<span>${t.strTeam}</span></div>
        <span class="stat">${t.intPlayed||0}</span>
        <span class="stat">${t.intWin||0}</span>
        <span class="stat">${t.intLoss||0}</span>
        <span class="pts">${t.intPoints||0}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}

function showPredict(home, away, hs, as) {
  // 简单AI预测算法
  const homeAdv = 10;
  let homeScore = 50 + homeAdv;
  let awayScore = 50;
  if(hs > 0 || as > 0) {
    homeScore = Math.round((hs/(hs+as||1))*100);
    awayScore = Math.round((as/(hs+as||1))*100);
  }
  const draw = Math.round((100 - Math.abs(homeScore-awayScore)) * 0.3);
  const total = homeScore + draw + awayScore;
  const h = Math.round(homeScore/total*100);
  const d = Math.round(draw/total*100);
  const a = 100-h-d;

  const modal = `<div id="predict-modal" onclick="this.remove()" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px">
    <div onclick="event.stopPropagation()" style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
      <div style="text-align:right;margin-bottom:8px"><span onclick="document.getElementById('predict-modal').remove()" style="cursor:pointer;color:var(--text3)">✕</span></div>
      <div style="text-align:center;font-weight:800;font-size:1rem;margin-bottom:4px">🔮 AI 预测分析</div>
      <div style="text-align:center;color:var(--text2);font-size:0.85rem;margin-bottom:16px">${home} vs ${away}</div>
      <div class="prob-row">
        <div class="prob-label"><span>🏠 主胜 ${home}</span><span style="font-weight:700;color:var(--accent)">${h}%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-home" style="width:${h}%"></div></div>
      </div>
      <div class="prob-row">
        <div class="prob-label"><span>🤝 平局 Draw</span><span style="font-weight:700;color:var(--yellow)">${d}%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-draw" style="width:${d}%"></div></div>
      </div>
      <div class="prob-row">
        <div class="prob-label"><span>✈️ 客胜 ${away}</span><span style="font-weight:700;color:var(--green)">${a}%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-away" style="width:${a}%"></div></div>
      </div>
      <div class="ai-note">⚠️ 预测基于历史数据分析，仅供参考<br>Prediction based on historical data analysis only</div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modal);
}

function showPredictPage() {
  document.getElementById('matches-content').innerHTML = `
    <div class="section-title">🔮 AI 预测情报</div>
    <div class="predict-card">
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:12px;text-align:center">点击任意比赛卡片查看 AI 预测分析</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div style="background:rgba(37,99,235,0.1);border-radius:8px;padding:12px">
          <div style="font-size:1.5rem">📊</div>
          <div style="font-size:0.7rem;color:var(--text3);margin-top:4px">历史数据</div>
        </div>
        <div style="background:rgba(56,189,248,0.1);border-radius:8px;padding:12px">
          <div style="font-size:1.5rem">🤖</div>
          <div style="font-size:0.7rem;color:var(--text3);margin-top:4px">AI 分析</div>
        </div>
        <div style="background:rgba(34,197,94,0.1);border-radius:8px;padding:12px">
          <div style="font-size:1.5rem">📈</div>
          <div style="font-size:0.7rem;color:var(--text3);margin-top:4px">概率预测</div>
        </div>
      </div>
    </div>
    <div class="predict-card">
      <div class="predict-teams">Liverpool vs Manchester City</div>
      <div class="prob-row">
        <div class="prob-label"><span>🏠 主胜 Liverpool</span><span style="font-weight:700;color:var(--accent)">52%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-home" style="width:52%"></div></div>
      </div>
      <div class="prob-row">
        <div class="prob-label"><span>🤝 平局 Draw</span><span style="font-weight:700;color:var(--yellow)">21%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-draw" style="width:21%"></div></div>
      </div>
      <div class="prob-row">
        <div class="prob-label"><span>✈️ 客胜 Man City</span><span style="font-weight:700;color:var(--green)">27%</span></div>
        <div class="prob-bar"><div class="prob-fill fill-away" style="width:27%"></div></div>
      </div>
      <div class="ai-note">⚠️ 仅供参考 · For reference only</div>
    </div>`;
}

function switchLeague(leagueId, key, el) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(key === 'predict') { showPredictPage(); return; }
  currentLeague = leagueId;
  loadMatches(leagueId);
  loadStandings(leagueId);
}

// 初始加载
loadMatches(4328);
loadStandings(4328);
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
